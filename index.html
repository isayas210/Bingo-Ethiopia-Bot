<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #1a1a1a; color: white; padding: 20px; }
        .game-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px auto; max-width: 300px; }
        .number { background: #34495e; padding: 15px; border-radius: 5px; cursor: pointer; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎮 Bingo Ethiopia</h1>
    <div id="game-info">Baga nagaan dhufte!</div>
    <div class="game-board" id="board">
        </div>
    <button class="btn" onclick="generateNumbers()">Kaardii Haaraa</button>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();

        function generateNumbers() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 1; i <= 25; i++) {
                const div = document.createElement('div');
                div.className = 'number';
                div.innerText = Math.floor(Math.random() * 75) + 1;
                board.appendChild(div);
            }
            tele.HapticFeedback.impactOccurred('medium');
        }
        generateNumbers();
    </script>
</body>
</html>
