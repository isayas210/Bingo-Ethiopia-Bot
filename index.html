<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #050505; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        
        /* Balance Header - Namatti kan hawwatu */
        .header-status { 
            background: linear-gradient(180deg, #1a1a1a 0%, #050505 100%);
            padding: 15px; border-bottom: 2px solid var(--gold);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .balance-box { background: rgba(46, 204, 113, 0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--green); }
        .balance-label { font-size: 10px; color: #aaa; display: block; }
        .balance-amt { color: var(--green); font-weight: 900; font-size: 18px; }

        /* Compact Selection Grid - 100 Cards */
        .selection-grid { 
            display: grid; grid-template-columns: repeat(10, 1fr); 
            gap: 3px; padding: 10px; background: #000;
        }
        .card-opt { 
            aspect-ratio: 1/1; font-size: 11px; display: flex; 
            align-items: center; justify-content: center; 
            background: var(--red); border-radius: 2px; cursor: pointer; 
            font-weight: bold; transition: 0.2s;
        }
        .card-opt.selected { background: var(--green); transform: scale(1.1); box-shadow: 0 0 10px var(--green); }

        /* Game Board Area */
        .caller-area { background: #111; padding: 20px; border-bottom: 3px solid var(--gold); font-size: 55px; color: var(--gold); font-weight: 900; }
        .boards-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 15px; scroll-snap-type: x mandatory; }
        .mini-board { 
            min-width: 280px; background: #151515; padding: 10px; 
            border-radius: 15px; border: 1px solid #333; scroll-snap-align: center;
        }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { 
            background: #222; aspect-ratio: 1/1; display: flex; 
            align-items: center; justify-content: center; 
            font-size: 16px; border-radius: 5px; border: 1px solid #333;
        }
        .marked { background: var(--green) !important; color: black; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        
        .timer-bar { height: 4px; background: var(--gold); width: 100%; transition: linear; }
        .btn-play { background: var(--gold); color: black; width: 90%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; margin: 15px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <div class="header-status">
            <div class="balance-box">
                <span class="balance-label">BALANCE</span>
                <span class="balance-amt">2,450.00 ETB</span>
            </div>
            <div id="timer-text" style="color:var(--gold); font-weight:bold;">30s</div>
        </div>
        <div class="timer-bar" id="t-bar"></div>
        <h3 style="margin:10px;">Kaartaa Filadhu (Hanga fedhe)</h3>
        <div class="selection-grid" id="s-grid"></div>
        <button class="btn-play" onclick="startGame()">TAPHA JALQABI</button>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-area" id="caller">...</div>
        <div style="color:#888; margin-top:10px;">Kaartaawwan Kee (Gara bitaatti shifit godhi)</div>
        <div class="boards-scroll" id="boards-container"></div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();
        
        let selectedCards = [];
        let calledNums = [];
        let timeLeft = 30;

        // 1. Kaartaa 100nuu xixxiqqoo uumuu
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card-opt';
            div.innerText = i;
            div.onclick = function() {
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selectedCards = selectedCards.filter(n => n !== i);
                } else {
                    this.classList.add('selected');
                    selectedCards.push(i);
                }
                tele.HapticFeedback.impactOccurred('light');
            };
            sGrid.appendChild(div);
        }

        // 2. Timer (Sekoondii 30)
        const tBar = document.getElementById('t-bar');
        const tText = document.getElementById('timer-text');
        const timer = setInterval(() => {
            timeLeft -= 0.1;
            tBar.style.width = (timeLeft / 30 * 100) + "%";
            tText.innerText = Math.ceil(timeLeft) + "s";
            if (timeLeft <= 0) {
                clearInterval(timer);
                startGame();
            }
        }, 100);

        function startGame() {
            if (selectedCards.length === 0) {
                // Kaartaa yoo hin filanne 1ffaa akka fakkeenyaatti fudhata
                selectedCards.push(1);
            }
            clearInterval(timer);
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            renderBoards();
            startCalling();
        }

        function renderBoards() {
            const container = document.getElementById('boards-container');
            selectedCards.forEach(id => {
                const bDiv = document.createElement('div');
                bDiv.className = 'mini-board';
                bDiv.innerHTML = `<div style="color:var(--gold); margin-bottom:5px;">Kaartaa #${id}</div><div class="grid" id="grid-${id}"></div>`;
                container.appendChild(bDiv);
                
                const grid = document.getElementById(`grid-${id}`);
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (r === 2 && c === 2) {
                            cell.innerText = "FREE";
                            cell.classList.add('marked');
                        } else {
                            const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                            cell.innerText = val;
                            cell.setAttribute('data-val', val);
                        }
                        grid.appendChild(cell);
                    }
                }
            });
        }

        function startCalling() {
            const caller = document.getElementById('caller');
            const callInterval = setInterval(() => {
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (calledNums.includes(n));
                calledNums.push(n);
                
                let L = n <= 15 ? 'B' : n <= 30 ? 'I' : n <= 45 ? 'N' : n <= 60 ? 'G' : 'O';
                caller.innerText = `${L}${n}`;
                
                // Kaartaawwan hunda irratti ofumaan mallatteessuu
                document.querySelectorAll(`.cell[data-val="${n}"]`).forEach(cell => {
                    cell.classList.add('marked');
                    tele.HapticFeedback.notificationOccurred('success');
                });

                if (calledNums.length >= 50) { // Fakkeenyaaf
                    clearInterval(callInterval);
                    caller.innerText = "BINGO!";
                    setTimeout(() => location.reload(), 2000);
                }
            }, 3000);
        }
    </script>
</body>
</html>
