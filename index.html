<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; --red: #e74c3c; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; }
        
        /* Top Bar Info */
        .top-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #1a1a1a; border-bottom: 2px solid var(--gold); }
        .balance { color: var(--green); font-weight: bold; }

        /* Bingo Grid Header */
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); max-width: 350px; margin: 5px auto; font-size: 30px; color: var(--gold); font-weight: 900; }

        /* Selection Screen */
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; height: 350px; overflow-y: auto; background: #111; margin: 10px; border-radius: 10px; }
        .card-opt { padding: 15px; background: var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card-opt.selected { background: var(--green); transform: scale(1.1); }
        .card-opt.taken { background: #f1c40f; color: black; cursor: not-allowed; }

        /* Calling Area */
        .caller-box { background: #222; padding: 20px; font-size: 55px; color: var(--gold); border-bottom: 5px solid var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; max-width: 360px; margin: 0 auto; }
        .cell { background: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 8px; border: 1px solid #333; transition: 0.3s; }
        .marked { background: var(--green) !important; box-shadow: 0 0 15px var(--green); }
        
        #timer-text { font-size: 20px; color: var(--gold); margin: 10px; }
    </style>
</head>
<body>

    <div id="select-screen">
        <div class="top-bar">
            <span>Kaartaa Filadhu (1-100)</span>
            <span class="balance">Balance: 150.00 ETB</span>
        </div>
        <div id="timer-text">Taphni jalqabuuf: 30s</div>
        <div class="selection-grid" id="s-grid"></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-box" id="caller">...</div>
        <div class="bingo-header">
            <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
        </div>
        <div class="grid" id="board"></div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        let calledNums = [];
        let selectedCard = null;
        let timeLeft = 30;

        // 1. Kaartaa 100 uumuu
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card-opt';
            div.innerText = i;
            
            // Kaartaa dursee filatame (Yellow/Keelloo)
            if([7, 25, 42, 90].includes(i)) {
                div.classList.add('taken');
                div.onclick = () => alert("Kaartaan kun dursee filatameera!");
            } else {
                div.onclick = function() {
                    document.querySelectorAll('.card-opt').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedCard = i;
                    tele.HapticFeedback.impactOccurred('medium');
                };
            }
            sGrid.appendChild(div);
        }

        // 2. Timer (Dirqama 30s turuu qaba)
        const tDisplay = document.getElementById('timer-text');
        const timer = setInterval(() => {
            timeLeft--;
            tDisplay.innerText = `Taphni jalqabuuf: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                startGame();
            }
        }, 1000);

        function startGame() {
            document.getElementById('select-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            initBoard();
            startCalling();
        }

        function initBoard() {
            const board = document.getElementById('board');
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 2 && c === 2) {
                        cell.innerText = "FREE";
                        cell.classList.add('marked');
                    } else {
                        const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                        cell.innerText = val;
                        cell.id = `num-${val}`;
                    }
                    board.appendChild(cell);
                }
            }
        }

        function startCalling() {
            const caller = document.getElementById('caller');
            const callInterval = setInterval(() => {
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (calledNums.includes(n));
                calledNums.push(n);
                
                let L = n <= 15 ? 'B' : n <= 30 ? 'I' : n <= 45 ? 'N' : n <= 60 ? 'G' : 'O';
                caller.innerText = `${L}${n}`;
                
                const target = document.getElementById(`num-${n}`);
                if (target) {
                    target.classList.add('marked');
                    tele.HapticFeedback.notificationOccurred('success');
                }
                
                // Injifannoo (Fakkeenyaaf 10 yoo mallatteeffame)
                if (document.querySelectorAll('.marked').length >= 10) {
                    clearInterval(callInterval);
                    caller.innerText = "WINNER!";
                    caller.style.color = "#2ecc71";
                    setTimeout(() => { location.reload(); }, 2000); // 2 Sec booda deebi'a
                }
            }, 4000);
        }
    </script>
</body>
</html>
