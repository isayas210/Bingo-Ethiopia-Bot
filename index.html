<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; }
        body { font-family: sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Selection Grid */
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; height: 300px; overflow-y: auto; background: #222; padding: 10px; border-radius: 10px; }
        .card-option { padding: 10px; background: #333; border: 1px solid #555; border-radius: 5px; cursor: pointer; }
        .card-option.selected { background: var(--gold); color: black; }
        
        /* Game Elements */
        .caller-box { background: #222; padding: 15px; border-bottom: 4px solid var(--gold); font-size: 24px; font-weight: bold; color: var(--gold); margin-bottom: 15px; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 320px; margin: 0 auto; }
        .cell { background: var(--card); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 5px; border: 1px solid #333; }
        .marked { background: var(--green) !important; color: white; box-shadow: 0 0 10px var(--green); }
        
        .timer { font-size: 20px; color: #ff4444; font-weight: bold; margin: 10px; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="selection-screen" class="screen active">
        <h2>Kaartaa Filadhu (1-100)</h2>
        <p class="timer" id="select-timer">30</p>
        <div class="selection-grid" id="selection-grid"></div>
        <br>
        <button class="btn" onclick="startGame()">Tapha Jalqabi</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="caller-box" id="caller-display">Qophaa'i...</div>
        <div class="bingo-board" id="board"></div>
        <div id="call-history" style="font-size: 12px; margin-top: 10px; color: #888;"></div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        
        let selectedCard = null;
        let gameStarted = false;
        let calledNumbers = [];
        const ranges = [{b:1, i:15}, {i:16, n:30}, {n:31, g:45}, {g:46, o:60}, {o:61, l:75}];

        // 1. Uuminsa Filannoo Kaartaa 1-100
        const grid = document.getElementById('selection-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card-option';
            div.innerText = i;
            div.onclick = () => {
                document.querySelectorAll('.card-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedCard = i;
            };
            grid.appendChild(div);
        }

        // 2. Timer Kaartaa Filachuuf (30 Sec)
        let timeLeft = 30;
        const timerLabel = document.getElementById('select-timer');
        const countdown = setInterval(() => {
            timeLeft--;
            timerLabel.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                if (!gameStarted) startGame();
            }
        }, 1000);

        function startGame() {
            gameStarted = true;
            clearInterval(countdown);
            document.getElementById('selection-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            createBoard();
            startCalling();
        }

        // 3. Kaartaa Taphaa Uumuu
        function createBoard() {
            const board = document.getElementById('board');
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 2 && c === 2) {
                        cell.innerText = "FREE";
                        cell.classList.add('marked');
                    } else {
                        const range = ranges[c];
                        cell.innerText = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
                        cell.onclick = function() {
                            if (calledNumbers.includes(parseInt(this.innerText))) {
                                this.classList.add('marked');
                                tele.HapticFeedback.impactOccurred('medium');
                            }
                        };
                    }
                    board.appendChild(cell);
                }
            }
        }

        // 4. Ofumaan Lakkoofsa Waamuu (Automatic Caller)
        function startCalling() {
            const display = document.getElementById('caller-display');
            const history = document.getElementById('call-history');
            
            setInterval(() => {
                let num;
                do { num = Math.floor(Math.random() * 75) + 1; } while (calledNumbers.includes(num));
                
                calledNumbers.push(num);
                let letter = num <= 15 ? 'B' : num <= 30 ? 'I' : num <= 45 ? 'N' : num <= 60 ? 'G' : 'O';
                
                display.innerText = `${letter}${num}`;
                history.innerText = "Hamma ammaatti: " + calledNumbers.slice(-10).join(", ");
                
                // Sound ykn Vibration Telegram
                tele.HapticFeedback.notificationOccurred('success');
            }, 5000); // Sekoondii 5 gidduutti lakkoofsa haaraa waama
        }
    </script>
</body>
</html>
