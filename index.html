<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethio 24/7 Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #050505; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        
        .header { background: #111; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .bal-box { background: rgba(46, 204, 113, 0.1); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--green); }
        .bal-amt { color: var(--green); font-weight: 900; font-size: 18px; }

        /* Kaartaawwan 8 Al-tokkotti (2x4 Grid) */
        .boards-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 6px; padding: 8px; 
        }
        .mini-card { background: #151515; padding: 4px; border-radius: 8px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .cell { background: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 2px; }
        .marked { background: var(--green) !important; color: black; font-weight: bold; }

        .caller-bar { background: #000; padding: 15px; font-size: 45px; color: var(--gold); font-weight: 900; border-bottom: 3px solid var(--gold); }
        #timer-msg { padding: 20px; color: var(--gold); font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-box">
            <small style="font-size: 10px; color: #aaa;">BALANCE</small><br>
            <span class="bal-amt" id="user-balance">2,500.00 ETB</span>
        </div>
        <div id="status" style="font-size: 12px; color: var(--gold);">24/7 ACTIVE</div>
    </div>

    <div id="selection-screen">
        <div id="timer-msg">Taphi Ofumaan Jalqaba: <span id="secs">30</span>s</div>
        <p style="font-size: 12px; color: #888;">Kaartaa filachuu baattus ofumaan siif filatama.</p>
        <div style="display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; padding: 10px;">
            </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-bar" id="caller">...</div>
        <div class="boards-grid" id="boards-container"></div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        let selectedCards = [1, 2, 3, 4, 5, 6, 7, 8]; // Ofumaan 8 filatama
        let calledNums = [];
        let timeLeft = 30;

        // Auto-Timer: Sekoondii 30 dhumnaan ofumaan jalqaba
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('secs').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                startGame();
            }
        }, 1000);

        function startGame() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            render8Boards();
            startCalling();
        }

        function render8Boards() {
            const container = document.getElementById('boards-container');
            selectedCards.forEach(id => {
                const bDiv = document.createElement('div');
                bDiv.className = 'mini-card';
                bDiv.innerHTML = `<div style="color:var(--gold); font-size:9px; margin-bottom:2px;">#${id}</div><div class="grid" id="grid-${id}"></div>`;
                container.appendChild(bDiv);
                
                const grid = document.getElementById(`grid-${id}`);
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (r === 2 && c === 2) {
                            cell.innerText = "F";
                            cell.classList.add('marked');
                        } else {
                            const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                            cell.innerText = val;
                            cell.setAttribute('data-val', val);
                        }
                        grid.appendChild(cell);
                    }
                }
            });
        }

        function startCalling() {
            const caller = document.getElementById('caller');
            const interval = setInterval(() => {
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (calledNums.includes(n));
                calledNums.push(n);
                
                let L = n <= 15 ? 'B' : n <= 30 ? 'I' : n <= 45 ? 'N' : n <= 60 ? 'G' : 'O';
                caller.innerText = `${L}${n}`;
                
                document.querySelectorAll(`.cell[data-val="${n}"]`).forEach(cell => {
                    cell.classList.add('marked');
                    tele.HapticFeedback.impactOccurred('medium');
                });

                if (calledNums.length > 40) {
                    clearInterval(interval);
                    caller.innerText = "BINGO!";
                    // Injifataaf: 100x100 = 10,000 + 300% (30,000) = 40,000 ETB
                    document.getElementById('user-balance').innerText = "40,000.00 ETB";
                    setTimeout(() => location.reload(), 5000);
                }
            }, 3000);
        }
    </script>
</body>
</html>
