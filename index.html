<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia Traditional</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #ffcc00; --secondary: #2c3e50; --bg: #121212; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 10px; }
        h1 { color: var(--primary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Bingo Header (B-I-N-G-O) */
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); max-width: 350px; margin: 10px auto; font-weight: bold; font-size: 24px; color: var(--primary); }

        /* Game Board */
        .game-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 0 auto; background: #333; padding: 10px; border-radius: 15px; border: 4px solid var(--primary); }
        
        .cell { background: var(--secondary); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid #444; }
        .cell:active { transform: scale(0.9); }
        .cell.marked { background: var(--primary); color: #000; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .cell.free { background: #e74c3c; font-size: 12px; }

        .btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 50px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
        .btn:hover { background: #ffdb4d; }
    </style>
</head>
<body>
    <h1>🎮 Bingo Ethiopia</h1>
    
    <div class="bingo-header">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
    </div>

    <div class="game-board" id="board">
        </div>

    <button class="btn" onclick="newGame()">Kaardii Haaraa</button>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand();

        function newGame() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // Ranges for Traditional Bingo: B(1-15), I(16-30), N(31-45), G(46-60), O(61-75)
            const ranges = [
                {min: 1, max: 15}, {min: 16, max: 30}, 
                {min: 31, max: 45}, {min: 46, max: 60}, {min: 61, max: 75}
            ];

            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    // Middle cell is "FREE" space
                    if (row === 2 && col === 2) {
                        cell.innerText = 'FREE';
                        cell.classList.add('free', 'marked');
                    } else {
                        const range = ranges[col];
                        const val = Math.floor(Math.random() * (range.max - range.min + 1)) + range.min;
                        cell.innerText = val;
                        cell.onclick = function() {
                            this.classList.toggle('marked');
                            tele.HapticFeedback.impactOccurred('light');
                        };
                    }
                    board.appendChild(cell);
                }
            }
        }

        newGame();
    </script>
</body>
</html>
