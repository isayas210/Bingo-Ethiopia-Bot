<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <title>Bingo Ethio Bot</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #1e1e1e; }
        .balance { color: #4CAF50; font-weight: bold; border: 1px solid #4CAF50; padding: 5px 10px; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; max-width: 400px; margin: auto; }
        .cell { background: #2c2c2c; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .selected { background: #b8860b !important; } /* Halluu Boora/Keelloo */
        .winner { background: #4CAF50 !important; color: white; } /* Magariisa Injifataaf */
        .controls { margin-top: 20px; padding: 10px; background: #1e1e1e; }
        .btn-plus { background: #ffcc00; border: none; padding: 5px 15px; font-size: 18px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div id="balanceDisplay" class="balance">1,540.00 ETB</div>
    <div style="color: #ffcc00;">Yeroo: <span id="timer">34s</span></div>
</div>

<p id="msg">Tikeetii kee filadhu (Gatii: <span id="ticketPrice">2</span> ETB)</p>

<div class="grid" id="bingoGrid">
    </div>

<div class="controls">
    <span>Gatii Muramu: </span>
    <b id="currentPrice">2</b> 
    <button class="btn-plus" onclick="increasePrice()">+</button>
</div>

<script>
    let balance = 1540;
    let price = 2;
    let selectedTickets = [];

    // Grid uumuu (1-100)
    const grid = document.getElementById('bingoGrid');
    for (let i = 1; i <= 100; i++) {
        let div = document.createElement('div');
        div.className = 'cell';
        div.innerText = i;
        div.onclick = () => selectTicket(i, div);
        grid.appendChild(div);
    }

    function increasePrice() {
        if (price < 20) {
            price += 2;
            document.getElementById('currentPrice').innerText = price;
            document.getElementById('ticketPrice').innerText = price;
        }
    }

    function selectTicket(num, element) {
        if (balance >= price) {
            balance -= price;
            selectedTickets.push(num);
            element.classList.add('selected');
            updateBalance();
            
            // Fakeenyaaf: Yoo tikeetii "8" filatte injifatte haa jannu
            if (num === 8) {
                let winAmount = price * 80;
                balance += winAmount;
                element.classList.remove('selected');
                element.classList.add('winner');
                alert("Baay'ee namatti tola! " + winAmount + " ETB injifatteetta!");
                updateBalance();
            }
        } else {
            alert("Qarshii gahaa hin qabdu!");
        }
    }

    function updateBalance() {
        document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + ".00 ETB";
        // Asitti LocalStorage fayyadamnee balance akka hin banne gochuu dandeenya
        localStorage.setItem('bingoBalance', balance);
    }
</script>

</body>
</html>
