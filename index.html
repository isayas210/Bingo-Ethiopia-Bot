<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #050505; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        
        /* Header & Balance */
        .header { background: #111; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .bal-box { background: rgba(46, 204, 113, 0.1); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--green); }
        .bal-amt { color: var(--green); font-weight: 900; }

        /* Selection Area */
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; max-height: 350px; overflow-y: auto; background: #000; }
        .card-opt { background: #222; padding: 12px 0; border-radius: 8px; border: 1px solid #444; font-weight: bold; font-size: 14px; }
        .card-opt.selected { background: var(--green); color: black; box-shadow: 0 0 10px var(--green); }

        /* Waiting Screen */
        #waiting-msg { padding: 40px 20px; color: var(--gold); font-style: italic; display: none; }

        /* Game Screen */
        .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 10px; }
        .mini-card { background: #151515; padding: 5px; border-radius: 8px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .cell { background: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 2px; }
        .marked { background: var(--green) !important; color: black; font-weight: bold; }
        .caller-bar { background: #000; padding: 15px; font-size: 45px; color: var(--gold); font-weight: 900; border-bottom: 3px solid var(--gold); }
        
        .btn-start { background: var(--gold); color: black; width: 85%; padding: 15px; border: none; border-radius: 12px; font-weight: 900; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-box">
            <small style="font-size:10px;">BALANCE</small><br>
            <span class="bal-amt">2,500.00 ETB</span>
        </div>
        <div id="status-text" style="color:var(--gold); font-weight:bold;">Kaartaa 1-20 Filadhu</div>
    </div>

    <div id="selection-screen">
        <div class="selection-grid" id="s-grid"></div>
        <button id="start-btn" class="btn-start" onclick="startGame()" style="display:none;">TAPHA JALQABI</button>
        <div id="waiting-msg">Taphi deemaa jira... Maaloo hanga marsaan kun xumuramuutti eegi.</div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-bar" id="caller">...</div>
        <div class="boards-grid" id="boards-container"></div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        let selectedCards = [];
        let isGameRunning = false; // Kun backend irraa dhufuu danda'a

        // Kaartaa 100 uumuu
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card-opt';
            div.innerText = "K-" + i;
            div.onclick = function() {
                if (isGameRunning) return; 
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selectedCards = selectedCards.filter(n => n !== i);
                } else if (selectedCards.length < 20) {
                    this.classList.add('selected');
                    selectedCards.push(i);
                }
                
                const btn = document.getElementById('start-btn');
                document.getElementById('status-text').innerText = `Filatame: ${selectedCards.length}/20`;
                btn.style.display = selectedCards.length > 0 ? 'inline-block' : 'none';
            };
            sGrid.appendChild(div);
        }

        function startGame() {
            isGameRunning = true;
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            renderBoards();
            startCalling();
        }

        // Namni haaraan yoo seene (Logic)
        function checkGameState() {
            // Fake check: taphni deemaa jira yoo ta'e filannoo dhoksi
            if (isGameRunning && selectedCards.length === 0) {
                document.getElementById('s-grid').style.display = 'none';
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('waiting-msg').style.display = 'block';
            }
        }

        function renderBoards() {
            const container = document.getElementById('boards-container');
            selectedCards.forEach(id => {
                const bDiv = document.createElement('div');
                bDiv.className = 'mini-card';
                bDiv.innerHTML = `<div style="color:var(--gold); font-size:9px;">#${id}</div><div class="grid" id="grid-${id}"></div>`;
                container.appendChild(bDiv);
                
                const grid = document.getElementById(`grid-${id}`);
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (r === 2 && c === 2) {
                            cell.innerText = "F";
                            cell.classList.add('marked');
                        } else {
                            const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                            cell.innerText = val;
                            cell.setAttribute('data-val', val);
                        }
                        grid.appendChild(cell);
                    }
                }
            });
        }

        function startCalling() {
            let calledNums = [];
            const interval = setInterval(() => {
                let n = Math.floor(Math.random() * 75) + 1;
                if (!calledNums.includes(n)) {
                    calledNums.push(n);
                    document.getElementById('caller').innerText = n;
                    document.querySelectorAll(`.cell[data-val="${n}"]`).forEach(el => el.classList.add('marked'));
                }
                if (calledNums.length > 50) {
                    clearInterval(interval);
                    isGameRunning = false;
                    setTimeout(() => location.reload(), 3000);
                }
            }, 3000);
        }
        
        checkGameState();
    </script>
</body>
</html>
