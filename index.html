<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia Bot</title>
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #000;
            --card-bg: #1a1a1a;
            --win: #4CAF50;
            --loss: #e91e63;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Header / Balance Section */
        .top-bar {
            width: 100%;
            background: #111;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #333;
        }

        .balance-box {
            color: #4CAF50;
            border: 2px solid #4CAF50;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
        }

        /* Bingo Grid */
        .bingo-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            width: 95%;
            max-width: 500px;
        }

        .cell {
            background: var(--card-bg);
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
        }

        /* Halluu Injifannoo - Diimaa jalaan Magariisa */
        .selected { background: #b8860b; border-color: var(--primary); }
        
        .winner { 
            background: var(--win) !important; 
            box-shadow: 0 0 15px var(--win);
            animation: pulse 1s infinite;
        }

        .loser { background: var(--loss) !important; }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border-top: 2px solid #333;
        }

        .price-btn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50%;
            cursor: pointer;
        }

        .info-text { font-size: 18px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="balance-box" id="balanceDisplay">0.00 ETB</div>
    <div style="color: var(--primary);">Yeroo: <span id="timer">40s</span></div>
</div>

<div class="bingo-container" id="grid">
    </div>

<div style="margin-bottom: 120px;"></div> <div class="controls">
    <div class="info-text">Tikeetii: <span id="currentPriceDisplay">2</span> ETB</div>
    <button class="price-btn" onclick="increasePrice()">+</button>
</div>

<script>
    // 1. Initial State & Refresh Storage
    let balance = parseFloat(localStorage.getItem('bingo_balance')) || 1540;
    let ticketPrice = 2;
    const grid = document.getElementById('grid');

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + " ETB";
        document.getElementById('currentPriceDisplay').innerText = ticketPrice;
        localStorage.setItem('bingo_balance', balance);
    }

    // 2. Gatii Tikeetii Dabaluu (+)
    function increasePrice() {
        if (ticketPrice < 20) {
            ticketPrice += 2;
        } else {
            ticketPrice = 2; // Hanga 20 qofa waan ta'eef deebisa
        }
        updateUI();
    }

    // 3. Grid Uumuu (1-100)
    for (let i = 1; i <= 100; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerText = i;
        cell.onclick = () => playBingo(i, cell);
        grid.appendChild(cell);
    }

    // 4. Tapha Jalqabuu (Play Logic)
    function playBingo(num, element) {
        if (balance < ticketPrice) {
            alert("Qarshii gahaa hin qabdu!");
            return;
        }

        // Qarshii hir'isuu
        balance -= ticketPrice;
        element.classList.add('selected');
        updateUI();

        // System-ni akka tasaa (Random) nama injifate haa filu
        // Fakeenyaaf: Namni lakkoofsa 8, 13, ykn 21 filate ni injifata
        const winningNumbers = [8, 13, 21, 33, 42, 52, 77, 91]; 

        setTimeout(() => {
            if (winningNumbers.includes(num)) {
                // INJIFANNOO (X80)
                let winAmount = ticketPrice * 80;
                balance += winAmount;
                element.classList.remove('selected');
                element.classList.add('winner'); // Halluu Magariisa
                alert("Baay'ee namatti tola! " + winAmount + " ETB injifatteetta!");
            } else {
                // LOOSS
                element.classList.remove('selected');
                element.classList.add('loser'); // Halluu Diimaa
                setTimeout(() => element.classList.remove('loser'), 1000);
            }
            updateUI();
        }, 500);
    }

    // Init update
    updateUI();
</script>

</body>
</html>
