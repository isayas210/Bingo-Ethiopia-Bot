<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; --red: #e74c3c; --green: #2ecc71; --yellow: #f1c40f; }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; overflow-x: hidden; }
        
        /* Header Bingo Style */
        .bingo-title { font-size: 40px; font-weight: 900; color: var(--gold); letter-spacing: 10px; margin: 10px 0; text-shadow: 2px 2px 10px rgba(255,204,0,0.5); }
        
        /* Selection Screen */
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; max-height: 400px; overflow-y: auto; background: #1a1a1a; border-radius: 15px; margin: 10px; }
        .card-opt { padding: 15px; background: var(--red); color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .card-opt.selected { background: var(--green); transform: scale(1.1); }
        .card-opt.taken { background: var(--yellow); cursor: not-allowed; opacity: 0.7; }

        /* Calling Display */
        .caller-box { background: linear-gradient(145deg, #222, #000); padding: 25px; border-bottom: 5px solid var(--gold); font-size: 50px; color: var(--gold); font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        /* Game Board */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; max-width: 360px; margin: 0 auto; }
        .cell { background: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 10px; border: 2px solid #333; transition: 0.5s; }
        .cell.auto-marked { background: var(--green) !important; color: white; box-shadow: 0 0 15px var(--green); border: none; transform: scale(1.05); }
        
        .timer-bar { height: 5px; background: var(--gold); width: 100%; transition: linear; }
    </style>
</head>
<body>

    <div id="select-screen" class="active-screen">
        <div class="bingo-title">BINGO</div>
        <h3>Kartellaa Filadhu</h3>
        <div id="t-bar" class="timer-bar"></div>
        <div class="selection-grid" id="s-grid"></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-box" id="caller">...</div>
        <div class="grid" id="board"></div>
        <p id="history" style="color: #666; font-size: 14px; margin-top: 15px;"></p>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();
        
        let calledNums = [];
        let myNums = [];
        let gameActive = false;

        // 1. Filannoo Kaartaa (1-100)
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card-opt';
            div.innerText = i;
            // Fake "Taken" numbers (fakkeenyaaf 5, 12, 45 dursee filatameera)
            if([5, 12, 45, 88].includes(i)) {
                div.classList.add('taken');
                div.onclick = () => alert("Kaartaan kun dursee filatameera!");
            } else {
                div.onclick = function() {
                    document.querySelectorAll('.card-opt').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    tele.HapticFeedback.impactOccurred('medium');
                    setTimeout(startGame, 500);
                };
            }
            sGrid.appendChild(div);
        }

        // Timer (30s)
        let tWidth = 100;
        const tInterval = setInterval(() => {
            tWidth -= 0.33;
            document.getElementById('t-bar').style.width = tWidth + "%";
            if (tWidth <= 0) { clearInterval(tInterval); if(!gameActive) startGame(); }
        }, 100);

        function startGame() {
            gameActive = true;
            clearInterval(tInterval);
            document.getElementById('select-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            initBoard();
            startCalling();
        }

        function initBoard() {
            const board = document.getElementById('board');
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 2 && c === 2) {
                        cell.innerText = "FREE";
                        cell.classList.add('auto-marked');
                    } else {
                        const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                        cell.innerText = val;
                        cell.id = `num-${val}`;
                    }
                    board.appendChild(cell);
                }
            }
        }

        function startCalling() {
            const caller = document.getElementById('caller');
            setInterval(() => {
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (calledNums.includes(n));
                calledNums.push(n);
                
                let L = n <= 15 ? 'B' : n <= 30 ? 'I' : n <= 45 ? 'N' : n <= 60 ? 'G' : 'O';
                caller.innerText = `${L}${n}`;
                
                // OFUMAAN MAGARIISA GOCHUU (Auto-Mark)
                const target = document.getElementById(`num-${n}`);
                if (target) {
                    target.classList.add('auto-marked');
                    tele.HapticFeedback.notificationOccurred('success');
                }
                document.getElementById('history').innerText = "Hamma ammaatti: " + calledNums.slice(-5).join(", ");
            }, 4000); 
        }
    </script>
</body>
</html>
