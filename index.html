<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethio 24/7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #050505; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .header { background: #111; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .bal-box { background: rgba(46, 204, 113, 0.1); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--green); }
        .bal-amt { color: var(--green); font-weight: 900; }
        
        /* Selection Area */
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px; max-height: 380px; overflow-y: auto; }
        .card-opt { background: #222; padding: 12px 0; border-radius: 8px; border: 1px solid #444; cursor: pointer; }
        .card-opt.selected { background: var(--green); color: black; font-weight: bold; border-color: white; }

        /* Timer UI */
        #timer-display { background: rgba(255, 204, 0, 0.1); color: var(--gold); padding: 10px; font-size: 18px; font-weight: bold; }

        /* Game Screen */
        .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; padding: 5px; }
        .mini-card { background: #151515; padding: 5px; border-radius: 6px; border: 1px solid #333; transition: 0.3s; }
        .winner-card { border: 3px solid var(--green); transform: scale(1.05); box-shadow: 0 0 15px var(--green); z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; }
        .cell { background: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 9px; }
        .marked { background: var(--green) !important; color: black; font-weight: bold; }
        .win-line { background: var(--green) !important; color: white !important; animation: flash 0.5s infinite alternate; }
        
        @keyframes flash { from { opacity: 1; } to { opacity: 0.5; } }
        .caller-bar { background: #000; padding: 10px; font-size: 45px; color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-box">
            <small style="font-size:10px;">BALANCE</small><br>
            <span class="bal-amt">2,500.00 ETB</span>
        </div>
        <div id="status" style="color:var(--gold); font-size: 14px;">Filatame: 0/20</div>
    </div>

    <div id="selection-screen">
        <div id="timer-display">Taphi Ofumaan Jalqaba: <span id="seconds">30</span>s</div>
        <p style="font-size: 11px; color: #888;">Kaartaa 1-20 filadhu. Kaartaa filachuu baattus ofumaan siif filatama.</p>
        <div class="selection-grid" id="s-grid"></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-bar" id="caller">...</div>
        <div class="boards-grid" id="boards-container"></div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        let selectedCards = [];
        let timeLeft = 30;
        let isBingo = false;

        // 1. Kaartaawwan 100 uumuu
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card-opt';
            div.innerText = i;
            div.onclick = function() {
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selectedCards = selectedCards.filter(n => n !== i);
                } else if (selectedCards.length < 20) {
                    this.classList.add('selected');
                    selectedCards.push(i);
                }
                document.getElementById('status').innerText = `Filatame: ${selectedCards.length}/20`;
            };
            sGrid.appendChild(div);
        }

        // 2. Timer (30s) - Ofumaan jalqaba
        const timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                // Kaartaa filachuu baatu tokko ofumaan filata
                if (selectedCards.length === 0) selectedCards.push(Math.floor(Math.random() * 100) + 1);
                launchGame();
            }
        }, 1000);

        function launchGame() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            renderGameBoards();
            runBingoEngine();
        }

        function renderGameBoards() {
            const container = document.getElementById('boards-container');
            selectedCards.forEach(id => {
                const bDiv = document.createElement('div');
                bDiv.className = 'mini-card';
                bDiv.id = `card-wrap-${id}`;
                bDiv.innerHTML = `<div style="font-size:9px; color:var(--gold); padding:2px;">KAARTAA #${id}</div><div class="grid" id="grid-${id}"></div>`;
                container.appendChild(bDiv);
                
                const grid = document.getElementById(`grid-${id}`);
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                for (let r = 0; r < 5; r++) {
                    for (let c = 0; c < 5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (r === 2 && c === 2) { cell.innerText = "F"; cell.classList.add('marked'); }
                        else {
                            const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                            cell.innerText = val; cell.setAttribute('data-val', val);
                        }
                        grid.appendChild(cell);
                    }
                }
            });
        }

        function runBingoEngine() {
            let called = [];
            const interval = setInterval(() => {
                if (isBingo) { clearInterval(interval); return; }
                
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (called.includes(n));
                called.push(n);
                document.getElementById('caller').innerText = n;

                document.querySelectorAll(`.cell[data-val="${n}"]`).forEach(el => {
                    el.classList.add('marked');
                    checkWinner();
                });

                if (called.length > 60) { clearInterval(interval); setTimeout(() => location.reload(), 5000); }
            }, 3000);
        }

        function checkWinner() {
            selectedCards.forEach(id => {
                const grid = document.getElementById(`grid-${id}`);
                const cells = Array.from(grid.children);
                
                // Tarree 1ffaa (Cells 0-4) akka injifatuuf
                const row1 = [cells[0], cells[1], cells[2], cells[3], cells[4]];
                
                if (row1.every(c => c.classList.contains('marked')) && !isBingo) {
                    isBingo = true;
                    row1.forEach(c => c.classList.add('win-line'));
                    
                    // Kaartaa injifate addatti calaqqisiisuu
                    const winnerWrap = document.getElementById(`card-wrap-${id}`);
                    winnerWrap.classList.add('winner-card');
                    
                    document.getElementById('caller').innerText = "BINGO!";
                    tele.HapticFeedback.notificationOccurred('success');
                    
                    setTimeout(() => {
                        alert(`Gammadi! Kaartaa #${id} sarara jalqabaa guutuun injifateera!`);
                        location.reload();
                    }, 4000);
                }
            });
        }
    </script>
</body>
</html>
