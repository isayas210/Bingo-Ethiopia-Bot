<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethio 24/7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #050505; --green: #2ecc71; --red: #ff4757; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .header { background: #111; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .bal-box { background: rgba(46, 204, 113, 0.1); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--green); }
        .bal-amt { color: var(--green); font-weight: 900; }
        
        /* BINGO Labels */
        .bingo-head { display: grid; grid-template-columns: repeat(5, 1fr); color: var(--gold); font-weight: bold; font-size: 10px; margin-bottom: 2px; }
        
        /* Game Grid */
        .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; }
        .mini-card { background: #151515; padding: 5px; border-radius: 8px; border: 1px solid #333; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; }
        .cell { background: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 2px; }
        .marked { background: var(--green) !important; color: black; font-weight: bold; }
        
        /* Winner Styles */
        .win-id { color: var(--red); font-weight: bold; font-size: 18px; }
        .win-money { color: var(--green); font-weight: bold; font-size: 20px; }
        .caller-bar { background: #000; padding: 10px; font-size: 45px; color: var(--gold); font-weight: 900; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-box">
            <span class="bal-amt">2,500.00 ETB</span>
        </div>
        <div id="status" style="color:var(--gold); font-size: 14px;">Tikeetii 100nuu Hirmaachaa Jiru</div>
    </div>

    <div id="selection-screen">
        <div style="padding: 20px; color: var(--gold);">Taphi Ofumaan Jalqaba: <span id="seconds">10</span>s</div>
        <p>Kaartaawwan kee 20 filadhu, kan hafe 80 manaaf ta'u.</p>
        <div id="s-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; max-height: 400px; overflow-y: auto;"></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-bar" id="caller">...</div>
        <div class="boards-grid" id="boards-container"></div>
    </div>

    <div id="overlay">
        <div id="win-msg"></div>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; background:var(--gold); border:none; border-radius:5px; font-weight:bold;">Taphata Haaraa</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        let myCards = [];
        let allCards = [];
        let timeLeft = 10;
        let isBingo = false;

        // 1. Tikeetii 100 uumuu
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.style = "background:#222; padding:10px; border-radius:5px; border:1px solid #444;";
            div.innerText = i;
            div.onclick = function() {
                if (this.style.background === 'rgb(46, 204, 113)') {
                    this.style.background = '#222';
                    myCards = myCards.filter(n => n !== i);
                } else if (myCards.length < 20) {
                    this.style.background = '#2ecc71';
                    myCards.push(i);
                }
                document.getElementById('status').innerText = `Filatame: ${myCards.length}/20`;
            };
            sGrid.appendChild(div);
        }

        // 2. Timer
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(timer); startGame(); }
        }, 1000);

        function startGame() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            const container = document.getElementById('boards-container');
            for (let i = 1; i <= 100; i++) {
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.id = `card-${i}`;
                let label = myCards.includes(i) ? `<span style="color:var(--green)">KEETII #${i}</span>` : `MANAA #${i}`;
                card.innerHTML = `<div class="bingo-head"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
                                 <div style="font-size:9px; margin-bottom:3px;">${label}</div>
                                 <div class="grid" id="grid-${i}"></div>`;
                container.appendChild(card);
                generateGrid(i);
            }
            runEngine();
        }

        function generateGrid(id) {
            const grid = document.getElementById(`grid-${id}`);
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 2 && c === 2) { cell.innerText = "F"; cell.classList.add('marked'); }
                    else {
                        const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                        cell.innerText = val; cell.setAttribute('data-val', val);
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function runEngine() {
            let called = [];
            const interval = setInterval(() => {
                if (isBingo) { clearInterval(interval); return; }
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (called.includes(n));
                called.push(n);
                document.getElementById('caller').innerText = n;
                document.querySelectorAll(`.cell[data-val="${n}"]`).forEach(el => {
                    el.classList.add('marked');
                    checkBingo();
                });
            }, 2000);
        }

        function checkBingo() {
            for (let i = 1; i <= 100; i++) {
                const cells = Array.from(document.getElementById(`grid-${i}`).children);
                const row1 = [cells[0], cells[1], cells[2], cells[3], cells[4]];
                
                if (row1.every(c => c.classList.contains('marked')) && !isBingo) {
                    isBingo = true;
                    const overlay = document.getElementById('overlay');
                    const msg = document.getElementById('win-msg');
                    overlay.style.display = 'flex';
                    
                    if (myCards.includes(i)) {
                        msg.innerHTML = `<h1>BINGO!</h1><p>Kaartaa Lakkoofsa <span class="win-id">#${i}</span></p>
                                         <p>Badhaasa: <span class="win-money">1,500.00 ETB</span></p>`;
                    } else {
                        msg.innerHTML = `<h1>BINGO!</h1><p>Injifataan Kaartaa Manaa <br><span style="font-size:30px;">#${i}</span></p>`;
                    }
                    tele.HapticFeedback.notificationOccurred('success');
                }
            }
        }
    </script>
</body>
</html>
