<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethio 24/7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #050505; --green: #2ecc71; --red: #ff4757; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Header & Balance */
        .header { background: #111; padding: 10px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .bal-box { background: rgba(46, 204, 113, 0.1); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--green); }
        .bal-amt { color: var(--green); font-weight: 900; }

        /* Caller & History */
        .caller-area { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); }
        .big-call { font-size: 50px; color: var(--gold); font-weight: 900; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .history { display: flex; gap: 5px; justify-content: center; overflow-x: auto; padding: 5px; font-size: 12px; color: #888; }
        
        /* Cards Area */
        .boards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .mini-card { background: #151515; padding: 5px; border-radius: 8px; border: 1px solid #333; }
        .bingo-head { display: grid; grid-template-columns: repeat(5, 1fr); color: var(--gold); font-weight: bold; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-top: 5px; }
        .cell { background: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 3px; }
        .marked { background: var(--green) !important; color: black; font-weight: bold; }
        
        /* Win Overlays */
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; flex-direction:column; }
        .win-card-id { color: var(--red); font-size: 35px; font-weight: 900; }
        .win-money { color: var(--green); font-size: 30px; font-weight: 900; }
    </style>
</head>
<body>

    <div class="header">
        <div class="bal-box">
            <span class="bal-amt" id="display-bal">2,500.00 ETB</span>
        </div>
        <div id="status" style="color:var(--gold); font-size: 12px;">Tikeetii 100nuu Hirmaachaa Jiru</div>
    </div>

    <div id="selection-screen">
        <div style="padding:20px; color:var(--gold); font-size:20px; font-weight:bold;">Taphi Ofumaan Jalqaba: <span id="seconds">10</span>s</div>
        <p style="font-size:12px; color:#aaa;">Kaartaa kee filadhu. Kaartaa tokkoon 50 ETB.</p>
        <div id="s-grid" style="display:grid; grid-template-columns:repeat(5, 1fr); gap:6px; padding:10px; max-height:450px; overflow-y:auto;"></div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-area">
            <div class="big-call" id="caller">...</div>
            <div class="history" id="call-history"></div>
        </div>
        <div class="boards-grid" id="boards-container"></div>
    </div>

    <div id="overlay">
        <div id="win-msg" style="text-align:center;"></div>
        <button onclick="location.reload()" style="margin-top:30px; padding:12px 25px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">TAPHA HAARAA</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        let myCards = [];
        let balance = 2500;
        let timeLeft = 10;
        let isBingo = false;
        let calledNumbers = [];

        // 1. Tikeetii 100 uumuu
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.style = "background:#222; padding:12px 0; border-radius:8px; border:1px solid #444; cursor:pointer;";
            div.innerText = i;
            div.onclick = function() {
                if (this.style.background === 'rgb(46, 204, 113)') {
                    this.style.background = '#222';
                    myCards = myCards.filter(n => n !== i);
                } else if (myCards.length < 20) {
                    this.style.background = '#2ecc71';
                    myCards.push(i);
                }
            };
            sGrid.appendChild(div);
        }

        // 2. Timer
        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(timer); startGame(); }
        }, 1000);

        function startGame() {
            if (myCards.length === 0) myCards.push(Math.floor(Math.random() * 100) + 1);
            
            // Balance hir'isuu (50 ETB per card)
            balance -= (myCards.length * 50);
            document.getElementById('display-bal').innerText = balance.toFixed(2) + " ETB";

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            // Maamilli kaartaa isaa qofa akka argu
            const container = document.getElementById('boards-container');
            myCards.forEach(id => {
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.innerHTML = `<div class="bingo-head"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
                                 <div style="font-size:10px; color:var(--gold); margin:4px 0;">KAARTAA KEETII #${id}</div>
                                 <div class="grid" id="grid-${id}"></div>`;
                container.appendChild(card);
                generateGrid(id);
            });
            
            // Kaartaawwan manaas duubatti ni uumamu (Hirmaannaa 100 mirkaneessuuf)
            for(let i=1; i<=100; i++) { if(!myCards.includes(i)) generateSilentGrid(i); }
            
            runEngine();
        }

        const gameGrids = {};
        function generateGrid(id) {
            const grid = document.getElementById(`grid-${id}`);
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            const cells = [];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 2 && c === 2) { cell.innerText = "F"; cell.classList.add('marked'); }
                    else {
                        const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                        cell.innerText = val; cell.setAttribute('data-val', val);
                    }
                    grid.appendChild(cell);
                    cells.push(cell);
                }
            }
            gameGrids[id] = cells;
        }

        function generateSilentGrid(id) {
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            const cells = [];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cellData = { marked: (r===2 && c===2), val: 0 };
                    if (!(r===2 && c===2)) {
                        cellData.val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                    }
                    cells.push(cellData);
                }
            }
            gameGrids[id] = cells;
        }

        function runEngine() {
            const interval = setInterval(() => {
                if (isBingo) { clearInterval(interval); return; }
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (calledNumbers.includes(n));
                calledNumbers.push(n);
                
                // Qubee waamuu (B-I-N-G-O)
                let letter = "B";
                if(n > 15) letter = "I"; if(n > 30) letter = "N"; if(n > 45) letter = "G"; if(n > 60) letter = "O";
                document.getElementById('caller').innerText = `${letter}${n}`;
                
                // History
                const hist = document.getElementById('call-history');
                hist.innerHTML = `<span>${letter}${n}</span> ` + hist.innerHTML;

                // Mark Cells
                for (let id in gameGrids) {
                    gameGrids[id].forEach(cell => {
                        if (cell.getAttribute && cell.getAttribute('data-val') == n) cell.classList.add('marked');
                        else if (cell.val == n) cell.marked = true;
                    });
                }
                checkBingo();
            }, 2500);
        }

        function checkBingo() {
            for (let id in gameGrids) {
                const cells = gameGrids[id];
                // Dalga (Horizontal rows: 0-4, 5-9, 10-14, 15-19, 20-24)
                for (let r = 0; r < 5; r++) {
                    let row = [cells[r*5], cells[r*5+1], cells[r*5+2], cells[r*5+3], cells[r*5+4]];
                    if (row.every(c => c.classList ? c.classList.contains('marked') : c.marked)) {
                        isBingo = true;
                        showWinner(id);
                        return;
                    }
                }
            }
        }

        function showWinner(id) {
            const overlay = document.getElementById('overlay');
            const msg = document.getElementById('win-msg');
            overlay.style.display = 'flex';
            
            if (myCards.includes(Number(id))) {
                let winAmt = myCards.length * 100; // Fake prize logic
                balance += winAmt;
                msg.innerHTML = `<h1 style="color:var(--gold)">BINGO!</h1>
                                 <p>Kaartaa Lakkoofsa <br><span class="win-card-id">#${id}</span></p>
                                 <p>Badhaasa: <br><span class="win-money">${winAmt} ETB</span></p>`;
            } else {
                msg.innerHTML = `<h1 style="color:var(--red)">MANAITU INJIFATE!</h1>
                                 <p>Kaartaa Lakkoofsa <br><span style="font-size:40px;">#${id}</span></p>
                                 <p style="color:#888;">Maamilarra qarshiin murameera.</p>`;
            }
            tele.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
