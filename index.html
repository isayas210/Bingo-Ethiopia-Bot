<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Ethiopia Multiplayer</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; --red: #e74c3c; --green: #2ecc71; --blue: #3498db; }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; text-align: center; margin: 0; }
        
        /* Balance & Info */
        .top-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #1a1a1a; border-bottom: 2px solid var(--gold); font-size: 16px; }
        .balance { color: var(--green); font-weight: bold; }

        /* B-I-N-G-O Headers */
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); max-width: 350px; margin: 5px auto; font-size: 28px; color: var(--gold); }

        /* Selection Screen */
        .selection-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; height: 350px; overflow-y: auto; background: #111; margin: 10px; border-radius: 10px; }
        .card-opt { padding: 15px; background: var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card-opt.selected { background: var(--blue); border: 2px solid white; }
        .card-opt.taken { background: #555; cursor: not-allowed; opacity: 0.5; }

        /* Timer Bar */
        .timer-container { width: 90%; background: #333; height: 10px; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--gold); width: 100%; transition: linear; }

        /* Calling Display */
        .caller-box { background: #222; padding: 15px; font-size: 45px; color: var(--gold); border-bottom: 3px solid var(--gold); }

        /* Winner Message */
        #winner-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--green); padding: 30px; border-radius: 20px; font-size: 24px; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.8); }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 10px; max-width: 350px; margin: 0 auto; }
        .cell { background: #1a1a1a; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 5px; border: 1px solid #333; }
        .marked { background: var(--green) !important; color: white; box-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>

    <div id="select-screen">
        <div class="top-bar">
            <span>Kaartaa Filadhu</span>
            <span class="balance">Balance: 150.00 ETB</span>
        </div>
        <div class="timer-container"><div id="t-fill" class="timer-fill"></div></div>
        <div class="selection-grid" id="s-grid"></div>
        <p>Sekoondii 30 eegi taphni hamma jalqabutti...</p>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="caller-box" id="caller">...</div>
        <div class="bingo-header">
            <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
        </div>
        <div class="grid" id="board"></div>
    </div>

    <div id="winner-popup">🏆 INJIFATTEETTA!<br><small id="win-card-num"></small></div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        let calledNums = [];
        let selectedCard = null;
        let timeLeft = 30;

        // 1. Uuminsa Kaartaa 100
        const sGrid = document.getElementById('s-grid');
        for (let i = 1; i <= 100; i++) {
            const div = document.createElement('div');
            div.className = 'card-opt';
            div.innerText = i;
            div.onclick = function() {
                if(!this.classList.contains('taken')) {
                    document.querySelectorAll('.card-opt').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedCard = i;
                    tele.HapticFeedback.impactOccurred('medium');
                }
            };
            sGrid.appendChild(div);
        }

        // 2. Timer Dirqama Sekoondii 30 (Dirqama turuu qabu)
        const tFill = document.getElementById('t-fill');
        const timer = setInterval(() => {
            timeLeft -= 0.1;
            tFill.style.width = (timeLeft / 30 * 100) + "%";
            if (timeLeft <= 0) {
                clearInterval(timer);
                startGame();
            }
        }, 100);

        function startGame() {
            document.getElementById('select-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            initBoard();
            startCalling();
        }

        function initBoard() {
            const board = document.getElementById('board');
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 2 && c === 2) {
                        cell.innerText = "FREE";
                        cell.classList.add('marked');
                    } else {
                        const val = Math.floor(Math.random() * (ranges[c][1] - ranges[c][0] + 1)) + ranges[c][0];
                        cell.innerText = val;
                        cell.id = `num-${val}`;
                    }
                    board.appendChild(cell);
                }
            }
        }

        function startCalling() {
            const caller = document.getElementById('caller');
            const callInterval = setInterval(() => {
                let n;
                do { n = Math.floor(Math.random() * 75) + 1; } while (calledNums.includes(n));
                calledNums.push(n);
                
                let L = n <= 15 ? 'B' : n <= 30 ? 'I' : n <= 45 ? 'N' : n <= 60 ? 'G' : 'O';
                caller.innerText = `${L}${n}`;
                
                const target = document.getElementById(`num-${n}`);
                if (target) {
                    target.classList.add('marked');
                    checkWinner(callInterval);
                }
            }, 3000);
        }

        function checkWinner(interval) {
            const markedCells = document.querySelectorAll('.cell.marked').length;
            // Fake Win Logic: If 10 numbers marked, show winner
            if (markedCells >= 10) {
                clearInterval(interval);
                const popup = document.getElementById('winner-popup');
                document.getElementById('win-card-num').innerText = "Kaartaa Lakkoofsa: " + (selectedCard || "Random");
                popup.style.display = 'block';
                
                // Sekoondii 2 booda gara filannootti deebi'i
                setTimeout(() => {
                    location.reload(); 
                }, 2000);
            }
        }
    </script>
</body>
</html>
